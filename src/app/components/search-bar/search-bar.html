<div class="flex flex-col sm:flex-row gap-3">
  <input
    [(ngModel)]="city"
    placeholder="🔍 Search city..."
    class="flex-1 px-4 py-3 rounded-xl border border-white/20 bg-white/20 backdrop-blur-sm text-white placeholder-white/70 outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"
    (keyup.enter)="search()"
    [class.bg-gray-800]="darkMode"
    [class.text-white]="darkMode"
    [class.placeholder-gray-400]="darkMode"
    [class.bg-white]="!darkMode"
    [class.text-gray-800]="!darkMode"
    [class.placeholder-gray-500]="!darkMode"
  />

  <button
    (click)="search()"
    class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-lg transition-all duration-200 hover:scale-105"
    [class.bg-blue-600]="!darkMode"
    [class.bg-blue-500]="darkMode"
    [class.text-white]="true"
  >
    Search
  </button>
</div>
